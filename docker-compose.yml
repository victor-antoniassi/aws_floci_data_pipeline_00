services:
  floci:
    image: floci/floci:1.5.28
    container_name: floci
    ports:
      - "4566:4566"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ${DATA_DIR:-./data}:/app/data
    environment:
      # Floci-required environment variables (hardcoded — container requirement)
      FLOCI_HOSTNAME: floci
      FLOCI_SERVICES_ECS_MOCK: "false"
      FLOCI_SERVICES_ECS_DOCKER_NETWORK: ${COMPOSE_NETWORK_NAME:-floci_network}
      FLOCI_STORAGE_MODE: persistent
      FLOCI_STORAGE_PERSISTENT_PATH: /app/data
    networks:
      - ${COMPOSE_NETWORK_NAME:-floci_network}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4566/_floci/health"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

networks:
  floci_network:
    name: ${COMPOSE_NETWORK_NAME:-floci_network}
    driver: bridge
